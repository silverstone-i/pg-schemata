# Publishes final releases to npm with the "latest" dist-tag.
# Triggered automatically when a semver tag (e.g. v1.2.3) is pushed.
# RC tags are excluded via a job-level condition.
#
# Prerequisites:
#   - NPM_TOKEN must be configured in the repository's GitHub Secrets

name: Publish Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    # Skip RC tags — they are handled by publish-rc.yml
    if: ${{ !contains(github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:unit

      - name: Run linting
        run: npm run lint

      - name: Publish to npm (latest)
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
